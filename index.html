<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <meta name="theme-color" content="#bbada0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="2048" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="nickname-overlay" id="nickname-overlay">
    <div class="nickname-modal">
      <h2 class="nickname-title">닉네임을 입력하세요</h2>
      <input
        type="text"
        id="nickname-input"
        class="nickname-input"
        maxlength="20"
        placeholder="닉네임"
        autocomplete="off"
      />
      <button class="restart-button" id="nickname-submit">게임 시작</button>
    </div>
  </div>

  <div class="page-layout">
    <!-- 좌측: 게임 영역 -->
    <div class="container">
      <div class="heading">
        <h1 class="title">2048</h1>
        <div class="scores-container">
          <div class="score-container" id="score-container">
            <div class="score-label">점수</div>
            <div class="score-value" id="score">0</div>
          </div>
          <div class="best-container">
            <div class="score-label">최고</div>
            <div class="score-value" id="best-score">0</div>
          </div>
        </div>
      </div>

      <div class="above-game">
        <p class="game-intro">숫자를 합쳐서 <strong>2048</strong>을 만들어보세요!</p>
        <button class="restart-button" id="btn-new">새 게임</button>
        <button class="share-button" id="btn-share">공유</button>
      </div>

      <div class="game-container">
        <div class="game-message hidden" id="game-message">
          <p id="message-text"></p>
          <div class="lower">
            <button class="keep-playing-button hidden" id="btn-continue">계속하기</button>
            <button class="retry-button" id="btn-retry">다시하기</button>
          </div>
        </div>
        <div class="grid-container" id="board-grid"></div>
        <div class="tile-container" id="tile-container"></div>
      </div>

      <p class="game-explanation">
        <strong class="important">게임 방법:</strong> <strong>방향키</strong>로 타일을 움직이세요.
        같은 숫자의 타일이 닿으면 <strong>합쳐집니다.</strong>
        <strong>2048</strong>을 만들면 승리!
      </p>
    </div>

    <!-- 우측: 리더보드 -->
    <div class="leaderboard-panel">
      <div class="leaderboard-header">
        <span class="leaderboard-crown">👑</span>
        <h2 class="leaderboard-title">랭킹</h2>
        <span class="leaderboard-badge">SOPT 36기</span>
      </div>
      <div class="leaderboard-body-wrap">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th class="col-rank">순위</th>
              <th class="col-name">닉네임</th>
              <th class="col-score">점수</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <tr><td colspan="3" class="leaderboard-loading">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="leaderboard-footer">
        게임 오버 시 자동으로 점수가 등록돼요
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
